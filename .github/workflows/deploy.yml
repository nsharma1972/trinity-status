name: Deploy → Production (oci-apps)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to CapRover (production)
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: ${{ secrets.CAPROVER_PROD_SERVER }}
          app: trinity-status
          token: ${{ secrets.CAPROVER_TRINITY_STATUS_TOKEN }}
